name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package.json

      - name: Install docs dependencies
        working-directory: docs
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No docs/package.json — building static index"
          fi

      - name: Build docs site
        working-directory: docs
        run: |
          if [ -d .vitepress ]; then
            npx vitepress build
          else
            mkdir -p _site
            for f in *.md; do
              [ -f "$f" ] || continue
              name="${f%.md}.html"
              pandoc "$f" -o "_site/$name" --standalone --metadata title="$f" 2>/dev/null || \
                cp "$f" "_site/$name"
            done
            cp README.md _site/index.html || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
