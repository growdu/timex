services:
  postgres:
    image: postgres:15-alpine
    container_name: timex-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-timex}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-timex_dev_password}
      POSTGRES_DB: ${DATABASE_NAME:-timex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  redis:
    image: redis:6-alpine
    container_name: timex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timex-backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - HOST=0.0.0.0
      - PORT=3000
      - RUN_MIGRATIONS_ON_BOOT=${RUN_MIGRATIONS_ON_BOOT:-true}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-timex}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-timex_dev_password}
      - DATABASE_NAME=${DATABASE_NAME:-timex}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-timex-dev-secret-key-2024-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-timex-uploads}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://localhost:9000/timex-uploads}
      - S3_PRESIGNED_TTL=${S3_PRESIGNED_TTL:-900}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-104857600}
      # AI（auto：配了 OPENAI_API_KEY 用 OpenAI，否则探测 Ollama，否则 mock）
      - AI_PROVIDER=${AI_PROVIDER:-auto}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: timex-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - timex-network

  minio:
    image: minio/minio:latest
    container_name: timex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  minio-init:
    image: minio/mc:latest
    container_name: timex-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/timex-uploads &&
      mc anonymous set download local/timex-uploads &&
      echo 'MinIO bucket ready: timex-uploads'
      "
    networks:
      - timex-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  timex-network:
    driver: bridge
