services:
  postgres:
    image: postgres:15-alpine
    container_name: timex-postgres
    environment:
      POSTGRES_USER: timex
      POSTGRES_PASSWORD: timex_dev_password
      POSTGRES_DB: timex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  redis:
    image: redis:6-alpine
    container_name: timex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timex-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=timex
      - DB_PASSWORD=timex_dev_password
      - DB_DATABASE=timex
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=timex_jwt_secret_change_in_production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:80
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timex-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timex-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - timex-network

volumes:
  postgres_data:
  redis_data:

networks:
  timex-network:
    driver: bridge
